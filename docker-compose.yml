services:
  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: auth-sys

    image: auth-sys:latest

    ports:
      - "${PORT}:${PORT}"

    env_file:
      - .env

    depends_on:
      mysql:
        condition: service_healthy

    restart: unless-stopped


  mysql:
    image: mysql:8

    container_name: auth-mysql

    env_file:
      - .env

    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations/schema.sql:/docker-entrypoint-initdb.d/schema.sql

    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

    restart: unless-stopped


volumes:
  mysql_data: