<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth Engine Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    /* Reset & Base Variables */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    :root {
      --bg-main: #0B0B0C;
      --bg-surface: #121214;
      --bg-sidebar: #0E0E10;
      --bg-header: #121214;
      --border-color: #27272a; /* zinc-800 */
      --text-main: #f4f4f5;   /* zinc-100 */
      --text-muted: #a1a1aa;  /* zinc-400 */
      --text-dark: #52525b;   /* zinc-500 */
      --indigo: #6366f1;
      
      --font-sans: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body {
      min-height: 100vh;
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: var(--font-sans);
      display: flex;
      flex-direction: column;
    }

    body ::selection {
      background-color: rgba(99, 102, 241, 0.3);
      color: #c7d2fe;
    }

    /* Layout Components */
    header {
      border-bottom: 1px solid var(--border-color);
      background-color: var(--bg-header);
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      items-content: center;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .brand-wrapper {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .brand-dot {
      height: 0.75rem;
      width: 0.75rem;
      border-radius: 50%;
      background-color: var(--indigo);
      box-shadow: 0 0 12px rgba(99, 102, 241, 0.5);
    }

    .brand-title {
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #d4d4d8;
      text-transform: uppercase;
    }

    .session-badge {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background-color: rgba(24, 24, 27, 0.6);
      border: 1px solid var(--border-color);
      padding: 0.5rem 1rem;
      border-radius: 0.75rem;
      font-size: 0.75rem;
    }

    .session-label {
      color: var(--text-dark);
    }

    #session-status {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      color: var(--text-muted);
    }

    .status-dot {
      height: 0.375rem;
      width: 0.375rem;
      border-radius: 50%;
    }

    .status-dot.guest { background-color: var(--text-dark); }
    .status-dot.active { background-color: #34d399; }

    .app-container {
      display: flex;
      flex: 1;
      min-height: calc(100vh - 69px);
    }

    /* Sidebar Navigation */
    nav {
      width: 20rem;
      border-r: 1px solid var(--border-color);
      background-color: var(--bg-sidebar);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      flex-shrink: 0;
    }

    .section-title {
      padding: 0 0.75rem;
      margin-bottom: 0.5rem;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text-dark);
      text-transform: uppercase;
    }

    .nav-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.625rem 0.75rem;
      border-radius: 0.75rem;
      border: 1px solid transparent;
      background: transparent;
      text-align: left;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s ease;
    }

    .nav-btn:hover {
      background-color: rgba(39, 39, 42, 0.4);
      color: #e4e4e7;
    }

    .nav-btn.active {
      background-color: #18181b;
      border-color: #3f3f46;
      color: var(--text-main);
    }

    .nav-btn-meta {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      min-width: 0;
    }

    .endpoint-path {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Main Console Workspace */
    main {
      flex: 1;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      max-width: 80rem;
      margin: 0 auto;
      width: 100%;
    }

    @media (min-width: 1024px) {
      main {
        flex-direction: row;
      }
    }

    .workspace-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .endpoint-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .method-badge {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.125rem 0.5rem;
      border-radius: 0.25rem;
      border: 1px solid transparent;
      letter-spacing: 0.05em;
      text-align: center;
    }

    /* Dynamic Method Rendering Styles */
    .method-post { background-color: rgba(16, 185, 129, 0.1); color: #34d399; border-color: rgba(16, 185, 129, 0.2); width: 3.5rem; text-align: center;}
    .method-get { background-color: rgba(59, 130, 246, 0.1); color: #60a5fa; border-color: rgba(59, 130, 246, 0.2); width: 3.5rem; text-align: center;}
    .method-patch { background-color: rgba(245, 158, 11, 0.1); color: #fbbf24; border-color: rgba(245, 158, 11, 0.2); width: 3.5rem; text-align: center;}
    .method-delete { background-color: rgba(239, 68, 68, 0.1); color: #f87171; border-color: rgba(239, 68, 68, 0.2); width: 3.5rem; text-align: center;}

    .endpoint-title {
      font-family: var(--font-mono);
      font-size: 1.125rem;
      font-weight: 500;
      color: #e4e4e7;
    }

    .endpoint-desc {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    /* Notices and Wrappers */
    .notice {
      border-radius: 0.75rem;
      padding: 1rem;
      font-size: 0.75rem;
    }
    .notice.hidden { display: none; }

    .notice-auth {
      background-color: rgba(239, 68, 68, 0.05);
      border: 1px solid rgba(239, 68, 68, 0.1);
      color: #f87171;
    }

    .notice-role {
      background-color: rgba(245, 158, 11, 0.05);
      border: 1px solid rgba(245, 158, 11, 0.1);
      color: #fbbf24;
    }

    .role-badge-admin {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      background-color: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
      color: #f59e0b;
      padding: 0 0.25rem;
      border-radius: 0.25rem;
    }

    .role-badge-user {
      font-size: 10px;
      font-weight: 700;
      background-color: #27272a;
      color: var(--text-muted);
      padding: 0.125rem 0.5rem;
      border-radius: 0.25rem;
      text-transform: uppercase;
    }

    .clear-session-btn {
      background: none;
      border: none;
      color: var(--text-dark);
      cursor: pointer;
      font-weight: 600;
      margin-left: 0.25rem;
      transition: color 0.2s;
    }
    .clear-session-btn:hover { color: #f87171; }

    .container-panel {
      background-color: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 0.75rem;
      padding: 1.25rem;
    }
    .container-panel.hidden { display: none; }

    .panel-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #a1a1aa;
      margin-bottom: 1rem;
    }

    .input-group-wrapper {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .input-field-block {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .input-label {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .field-tag {
      font-size: 10px;
      padding: 0 0.25rem;
      border-radius: 0.25rem;
      border: 1px solid transparent;
    }
    .field-tag.params { background-color: rgba(245, 158, 11, 0.05); border-color: rgba(245, 158, 11, 0.1); color: #fbbf24;}
    .field-tag.body { background-color: rgba(16, 185, 129, 0.05); border-color: rgba(16, 185, 129, 0.1); color: #34d399;}

    .form-input {
      background-color: #18181B;
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      font-size: 0.75rem;
      color: #e4e4e7;
      font-family: var(--font-mono);
      transition: border-color 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: #52525b;
    }

    .btn-execute {
      width: 100%;
      background-color: #f4f4f5;
      color: #09090b;
      font-weight: 600;
      font-size: 0.75rem;
      padding: 0.75rem;
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn-execute:hover { background-color: #ffffff; }
    .btn-execute:active { transform: scale(0.99); }

    /* Output Terminal Pane */
    .terminal-pane {
      width: 100%;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    @media (min-width: 1024px) {
      .terminal-pane { width: 480px; }
    }

    .terminal-box {
      background-color: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 0.75rem;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 350px;
    }

    .terminal-header {
      border-bottom: 1px solid var(--border-color);
      padding: 0.75rem 1rem;
      background-color: #151518;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .terminal-status-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .terminal-status-wrap.hidden { display: none; }

    .terminal-indicator {
      height: 0.5rem;
      width: 0.5rem;
      border-radius: 50%;
    }
    .terminal-indicator.ok { background-color: #34d399; }
    .terminal-indicator.err { background-color: #f87171; }

    .terminal-status-text {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 700;
    }
    .terminal-status-text.ok { color: #34d399; }
    .terminal-status-text.err { color: #f87171; }

    .terminal-body {
      flex: 1;
      padding: 1.25rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      overflow-y: auto;
      background-color: var(--bg-sidebar);
      color: #e4e4e7;
    }

    .terminal-body pre {
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .terminal-placeholder {
      color: var(--text-dark);
      font-style: italic;
      user-select: none;
    }
  </style>
</head>
<body>

  <header>
    <div class="brand-wrapper">
      <div class="brand-dot"></div>
      <h1 class="brand-title">Auth Engine Playground</h1>
    </div>
    
    <div class="session-badge">
      <span class="session-label">Session Status:</span>
      <div id="session-status">
        <span class="status-dot guest"></span>
        <span>Guest Context</span>
      </div>
    </div>
  </header>

  <div class="app-container">
    
    <nav id="sidebar">
      <div class="section-title">Router Endpoints</div>
    </nav>

    <main>
      <div class="workspace-pane">
        <div>
          <div class="endpoint-header">
            <span id="endpoint-method" class="method-badge"></span>
            <h2 id="endpoint-path" class="endpoint-title"></h2>
          </div>
          <p id="endpoint-description" class="endpoint-desc"></p>
        </div>

        <div id="auth-notice" class="notice notice-auth hidden">
          Notice: Authentication token or session missing for this route wrapper.
        </div>
        <div id="role-notice" class="notice notice-role hidden">
          Notice: Client role context does not match route permission constraints.
        </div>

        <div id="param-container" class="container-panel hidden">
          <h3 class="panel-title">Request Parameters</h3>
          <div id="inputs-wrapper" class="input-group-wrapper"></div>
        </div>

        <button id="execute-btn" class="btn-execute">
          Execute Request
        </button>
      </div>

      <div class="terminal-pane">
        <div class="terminal-box">
          
          <div class="terminal-header">
            <span class="panel-title">Response Buffer</span>
            <div id="response-status-wrapper" class="terminal-status-wrap hidden">
              <span id="status-indicator" class="terminal-indicator"></span>
              <span id="response-status" class="terminal-status-text"></span>
            </div>
          </div>

          <div class="terminal-body">
            <pre id="response-block" class="terminal-placeholder">No active logs. Execute query.</pre>
          </div>

        </div>
      </div>
    </main>
  </div>
  <script src="./index.js"></script>
</body>
</html>
